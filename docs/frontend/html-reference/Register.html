<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - IPB Smart Reserve Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #0A9361;
            --primary-green-dark: #064e3b;
            --gold: #d9b45d;
            --text-dark: #2D3748;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --bg-light: #F8FAFC;
            --card-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            --hero-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            background-color: #ffffff;
        }

        /* Layout Split Screen */
        .split-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .left-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .right-panel {
            flex: 1;
            /* Placeholder gambar rektorat IPB */
            background-image: linear-gradient(135deg, rgba(6, 78, 59, 0.22), rgba(217, 180, 93, 0.24)), var(--hero-image);
            background-size: cover;
            background-position: center;
            display: none;
        }

        @media (min-width: 768px) {
            .right-panel {
                display: block;
            }
        }

        /* Form Container */
        .form-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        /* Logo Branding */
        .brand-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 3rem;
            line-height: 1.1;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Typography */
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Form Styling */
        .form-section {
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1rem;
            margin: 0 0 1.25rem;
        }

        .form-section legend {
            padding: 0 0.25rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.35rem;
        }

        .form-group {
            margin-bottom: 1.35rem;
            flex: 1; /* Agar kolom membagi ruang sama rata */
        }

        /* Override margin bawah untuk elemen di dalam form-row */
        .form-row .form-group {
            margin-bottom: 0; 
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            background-color: var(--bg-light);
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(10, 147, 97, 0.1);
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.15rem;
        }

        .btn-submit:hover {
            background-color: #087a50;
        }

        /* Bottom Link */
        .login-link {
            text-align: center;
            margin-top: 2rem;
            padding-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-green);
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-height: 760px) and (min-width: 768px) {
            .brand-header {
                margin-bottom: 2rem;
            }

            .form-row,
            .form-group {
                margin-bottom: 1rem;
            }

            .subtitle {
                margin-bottom: 1.4rem;
            }
        }

        /* Responsive HP: Kembali ke 1 Kolom */
        @media (max-width: 767px) {
            body {
                min-height: 100vh;
                background: var(--bg-light);
            }

            .split-layout {
                min-height: 100vh;
                display: block;
                background:
                    linear-gradient(180deg, rgba(6, 78, 59, 0.08), rgba(248, 250, 252, 0) 42%),
                    var(--bg-light);
            }

            .left-panel {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: flex-start;
                padding: 132px 20px 24px;
                background: transparent;
                overflow: visible;
            }

            .left-panel::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 230px;
                background-image:
                    linear-gradient(135deg, rgba(6, 78, 59, 0.92), rgba(10, 147, 97, 0.72), rgba(217, 180, 93, 0.48)),
                    var(--hero-image);
                background-size: cover;
                background-position: center;
            }

            .left-panel::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 230px;
                background-image:
                    linear-gradient(rgba(255,255,255,0.09) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.09) 1px, transparent 1px);
                background-size: 32px 32px;
                opacity: 0.72;
                pointer-events: none;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .form-row .form-group {
                margin-bottom: 1.25rem;
            }
            .form-container {
                max-width: none;
                background: #ffffff;
                border: 1px solid rgba(226, 232, 240, 0.95);
                border-radius: 16px;
                box-shadow: var(--card-shadow);
                padding: 28px 20px 24px;
            }

            .brand-header {
                margin-bottom: 2rem;
                padding-bottom: 1.25rem;
                border-bottom: 1px solid var(--border-color);
            }

            .brand-logo {
                font-size: 2.55rem;
                margin-bottom: 0.35rem;
            }

            .brand-title {
                font-size: 1rem;
            }

            h2 {
                font-size: 1.45rem;
            }

            .subtitle {
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .input-wrapper input {
                min-height: 48px;
                border-radius: 10px;
                background-color: #ffffff;
            }

            .btn-submit {
                min-height: 48px;
                border-radius: 10px;
                box-shadow: 0 10px 18px rgba(10, 147, 97, 0.2);
                margin-top: 0;
            }

            .login-link {
                margin-top: 1.25rem;
            }

            .footer {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 22px;
                padding: 0 8px;
                z-index: 1;
            }
        }
    .lucide-icon{display:inline-block;vertical-align:-.18em;flex:0 0 auto}</style>
</head>
<body>

    <div class="split-layout">
        <div class="left-panel">
            <div class="form-container">
                
                <div class="brand-header">
                    <h1 class="brand-logo">IPB<br>SRH</h1>
                    <div class="brand-title">IPB Smart Reserve Hub</div>
                </div>

                <h2>Daftar Akun</h2>
                <p class="subtitle">Buat akun untuk mengelola peminjaman fasilitas kampus.</p>

                <form action="#" method="POST">
                    
                    <fieldset class="form-section">
                        <legend>Data Identitas</legend>

                    <div class="form-group">
                        <label for="name">Nama Lengkap</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                            <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nim">NIM</label>
                            <div class="input-wrapper">
                                <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16"/><path d="M4 15h16"/><path d="M10 3 8 21"/><path d="m16 3-2 18"/></svg></span>
                                <input type="text" id="nim" name="nim" placeholder="Contoh: G64..." required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Kampus</label>
                            <div class="input-wrapper">
                                <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></span>
                                <input type="email" id="email" name="email" placeholder="@apps.ipb.ac.id" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Nomor Telepon</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg></span>
                            <input type="tel" id="phone" name="phone" placeholder="Contoh: 081234567890" required>
                        </div>
                    </div>

                    </fieldset>

                    <fieldset class="form-section">
                        <legend>Buat Kata Sandi</legend>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Kata Sandi</label>
                            <div class="input-wrapper">
                                <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">Konfirmasi Kata Sandi</label>
                            <div class="input-wrapper">
                                <span class="input-icon" aria-hidden="true"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                            </div>
                        </div>
                    </div>

                    </fieldset>

                    <button type="submit" class="btn-submit">
                        Buat Akun <span aria-hidden="true">&#8594;</span>
                    </button>
                    
                    <div class="login-link">
                        Sudah punya akun? <a href="login.html">Masuk di sini</a>
                    </div>
                </form>
            </div>

            <div class="footer">
                &copy; 2026 IPB Smart Reserve Hub.<br>
            </div>
        </div>

        <div class="right-panel"></div>
    </div>

</body>
</html>
