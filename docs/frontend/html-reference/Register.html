<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - IPB Smart Reserve Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #0A9361;
            --text-dark: #2D3748;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --bg-light: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden; /* Mengunci scroll bar utama */
        }

        /* Layout Split Screen */
        .split-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .left-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            padding: 1.5rem;
            position: relative;
            min-width: 320px;
            overflow-y: auto; /* Memungkinkan scroll kecil di dalam panel kiri jika layar benar-benar kecil */
        }

        .right-panel {
            flex: 1.2;
            /* Placeholder gambar rektorat IPB */
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            display: none;
        }

        @media (min-width: 992px) {
            .right-panel {
                display: block;
            }
        }

        /* Form Container - Diperlebar sedikit untuk 2 kolom */
        .form-container {
            width: 100%;
            max-width: 480px; 
            margin: auto;
            padding-bottom: 2rem; /* Ruang untuk footer */
        }

        /* Logo Branding (Dibuat lebih compact) */
        .brand-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 2.2rem;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .brand-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Typography */
        h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 1.2rem;
            line-height: 1.3;
        }

        /* Form Styling */
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
            flex: 1; /* Agar kolom membagi ruang sama rata */
        }

        /* Override margin bawah untuk elemen di dalam form-row */
        .form-row .form-group {
            margin-bottom: 0; 
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.6rem 0.8rem 0.6rem 2.2rem; /* Padding dikurangi agar tidak terlalu tinggi */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            background-color: var(--bg-light);
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(10, 147, 97, 0.1);
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 0.7rem;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: #087a50;
        }

        /* Bottom Link */
        .login-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-green);
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 1rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        /* Responsive HP: Kembali ke 1 Kolom */
        @media (max-width: 576px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .form-row .form-group {
                margin-bottom: 1rem;
            }
            .form-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="split-layout">
        <div class="left-panel">
            <div class="form-container">
                
                <div class="brand-header">
                    <h1 class="brand-logo">IPB<br>SRH</h1>
                    <div class="brand-title">IPB Smart Reserve Hub</div>
                </div>

                <h2>Register Account</h2>
                <p class="subtitle">Buat akun untuk mengelola peminjaman fasilitas kampus.</p>

                <form action="#" method="POST">
                    
                    <div class="form-group">
                        <label for="name">Nama Lengkap</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nim">NIM</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-id-card"></i>
                                <input type="text" id="nim" name="nim" placeholder="Contoh: G64..." required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Kampus</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" id="email" name="email" placeholder="@apps.ipb.ac.id" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">Konfirmasi Sandi</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        Create Account <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    
                    <div class="login-link">
                        Sudah punya akun? <a href="login.html">Sign In di sini</a>
                    </div>
                </form>
            </div>

            <div class="footer">
                &copy; 2026 IPB Smart Reserve Hub.<br>
            </div>
        </div>

        <div class="right-panel"></div>
    </div>

</body>
</html>
