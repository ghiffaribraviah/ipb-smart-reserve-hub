<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Navigation Drawer - IPB Smart Reserve Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f8fafc;--surface:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--green:#0f9d58;--indigo:#6366f1;--red:#dc2626;--shadow:0 10px 30px rgba(15,23,42,.16);--nav:64px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}.phone{width:390px;max-width:100%;min-height:844px;margin:28px auto;background:#f8fafc;border:1px solid var(--border);border-radius:28px;overflow:hidden;position:relative;box-shadow:0 18px 50px rgba(15,23,42,.18)}.navbar{height:var(--nav);background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px}.left,.right{display:flex;align-items:center;gap:14px}.hamburger{border:0;background:transparent;color:var(--muted);font-size:24px;padding:0}.logo{font-family:'Playfair Display',serif;color:#1d7667;font-size:22px;font-weight:700}.bell{border:0;background:#fffbeb;color:#6b7280;width:36px;height:36px;border-radius:50%;font-size:18px}.avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}.content{padding:24px 16px}.card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05)}h1{font-size:26px;margin:0 0 8px}.muted{color:var(--muted);font-size:14px;margin:0}.overlay{position:absolute;inset:0;background:rgba(15,23,42,.42);display:flex}.drawer{width:312px;max-width:84%;background:white;box-shadow:var(--shadow);padding:20px 18px;display:flex;flex-direction:column}.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.close{border:0;background:#f3f4f6;border-radius:8px;width:36px;height:36px;font-size:20px;color:var(--muted)}.profile{border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:18px}.profile .avatar{background:var(--indigo)}.profile-name{font-weight:700;font-size:14px}.profile-role{color:var(--muted);font-size:12px}.nav-list{display:flex;flex-direction:column;gap:6px}.nav-item{display:flex;align-items:center;gap:12px;border-radius:10px;padding:12px 10px;color:var(--muted);font-weight:700;font-size:14px}.nav-item.active{background:#e8f5e9;color:var(--green)}.nav-item.super-active{background:#ede9fe;color:var(--indigo)}.nav-icon{width:24px;text-align:center}.drawer-foot{margin-top:auto;border-top:1px solid var(--border);padding-top:16px}.logout{color:var(--red)}@media(max-width:420px){.phone{margin:0;border:0;border-radius:0;min-height:844px;width:100%}}
    .lucide-icon{display:inline-block;vertical-align:-.18em;flex:0 0 auto}

        /* Shared layout shell header/footer alignment */
        :root{--shared-shell-nav:72px;--navbar-height:72px;--nav:72px}
        .navbar{position:fixed;inset:0 0 auto;width:100%;height:var(--navbar-height,var(--nav,var(--shared-shell-nav)));background:#fff;border-bottom:1px solid var(--border-color,var(--border,#e5e7eb));display:flex;justify-content:center;z-index:1000}
        .navbar-content{width:1200px;max-width:95%;display:flex;align-items:center;justify-content:space-between;gap:22px}
        .nav-left,.nav-center,.nav-right{display:flex;align-items:center;gap:22px}
        .nav-center{gap:40px}
        .logo-nav{font-family:'Playfair Display',serif;color:#1d7667;font-size:24px;font-weight:700;line-height:1.05;text-decoration:none;white-space:nowrap}
        .mobile-menu-btn{display:none;border:0;background:transparent;color:var(--secondary-text,var(--muted,#6b7280));font-size:24px;padding:0;line-height:1;cursor:pointer}
        .nav-link{font-size:14px;font-weight:700;color:var(--secondary-text,var(--muted,#6b7280));text-decoration:none}
        .nav-link.active{color:var(--brand-green,var(--green,#0f9d58));border-bottom:2px solid currentColor;padding-bottom:4px}
        .nav-search{position:relative;display:flex;align-items:center;min-width:232px;height:40px;color:var(--secondary-text,var(--muted,#6b7280))}
        .nav-search input{width:250px;height:40px;border:1px solid #dbe2ea;border-radius:999px;background:linear-gradient(180deg,#fff,#f8fafc);box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 1px 2px rgba(15,23,42,.04);padding:0 16px 0 42px;color:var(--secondary-text,var(--muted,#6b7280));font:500 13px var(--sans-serif,Inter,system-ui,sans-serif);outline:none}
        .nav-search input:focus{border-color:var(--brand-green,var(--green,#0f9d58));background:#fff}
        .nav-search .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#94a3b8;display:inline-flex;align-items:center;justify-content:center;pointer-events:none}
        .nav-notifications{border:0;background:transparent;color:#6b7280;font-size:19px;padding:0;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
        .profile-pic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;background:var(--brand-green,var(--green,#0f9d58));border:0;overflow:hidden;font-size:13px;font-weight:700;text-decoration:none;flex:0 0 34px}
        .profile-pic img{width:100%;height:100%;object-fit:cover}
        .footer{border-top:1px solid var(--border-color,var(--border,#e5e7eb));padding:22px 0;background:#fff;display:flex;justify-content:center}
        .footer-content{width:1200px;max-width:95%;display:flex;align-items:center;justify-content:space-between;gap:24px}
        .footer-left,.footer-brand,.footer-content>div:first-child{display:flex;align-items:center;gap:16px;min-width:0}
        .logo-footer,.footer-logo{font-family:'Playfair Display',serif;font-size:30px;color:#4da38b;margin:0;line-height:1;white-space:nowrap;letter-spacing:0}
        .copyright,.footer-copy,.footer .muted{font-size:13px;color:var(--secondary-text,var(--muted,#6b7280));margin:0;line-height:1.5}
        .footer-right,.footer-links{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:10px 18px;color:var(--secondary-text,var(--muted,#6b7280));font-size:14px;font-weight:600}
        .footer-right a,.footer-links a{white-space:nowrap;text-decoration:none;color:inherit}
        @media(max-width:768px){:root{--shared-shell-nav:64px;--navbar-height:64px;--nav:64px}.navbar-content{max-width:100%;padding:0 14px}.mobile-menu-btn{display:block}.logo-nav br{display:none}.logo-nav span{margin-left:6px}.nav-center,.nav-search{display:none}.nav-left,.nav-right{gap:14px}.footer{padding:22px 0}.footer-content{flex-direction:column;align-items:center;text-align:center;gap:14px}.footer-left,.footer-brand,.footer-content>div:first-child{flex-direction:column;gap:8px}.footer-right,.footer-links{justify-content:center;align-items:center}}

    </style>
</head>
<body>
    <main class="phone">
        <header class="navbar"><div class="left"><button class="hamburger" aria-label="Buka navigasi">&#9776;</button><div class="logo">IPB SRH</div></div><div class="right"><button class="bell" aria-label="Notifikasi"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 21a2 2 0 0 0 4 0"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/></svg></button><div class="avatar">NP</div></div></header>
        <section class="content"><div class="card"><h1>Beranda</h1><p class="muted">Konten halaman tetap terlihat di belakang overlay saat drawer terbuka.</p></div></section>
        <div class="overlay">
            <aside class="drawer" aria-label="Navigasi mobile">
                <div class="drawer-head"><div class="logo">IPB SRH</div><button class="close" aria-label="Tutup navigasi">×</button></div>
                <div class="profile"><div class="avatar">SA</div><div><div class="profile-name">Super Admin</div><div class="profile-role">super_admin@apps.ipb.ac.id</div></div></div>
                <nav class="nav-list">
                    <a class="nav-item active"><span class="nav-icon"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 9-8 9 8"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></svg></span>Beranda Mahasiswa</a>
                    <a class="nav-item"><span class="nav-icon"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg></span>Fasilitas</a>
                    <a class="nav-item"><span class="nav-icon"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg></span>Reservasi</a>
                    <a class="nav-item super-active"><span class="nav-icon"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg></span>Sistem Super Admin</a>
                </nav>
                <div class="drawer-foot"><a class="nav-item logout"><span class="nav-icon"><svg class="lucide-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg></span>Keluar</a></div>
            </aside>
        </div>
    </main>
</body>
</html>
